---
# Standalone smoke test for the assume_role role - proves the IAM
# user->role trust works before wiring it into real provisioning.
# connection: local makes 'localhost' explicit (no SSH involved).
# The vars here override the role's defaults (see variable precedence).
- name: Test Assume Role
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    role_arn: arn:aws:iam::781436988948:role/fhs-main-test-ire-redhataap-role
    aws_region: us-east-1
    application_name: home-lab

  roles:
    - yoganand.aws.assume_role
