---
# This role exchanges the controller's base credentials for TEMPORARY STS
# credentials of a target IAM role, then exposes them as facts so later
# roles (s3_bucket, etc.) can call AWS as that role. Tasks in main.yml run
# top-to-bottom when the role is applied.
#
# assert = fail fast with a clear message instead of a confusing AWS error
# three tasks later. `that` is a list of Jinja conditions that must all be
# true.
- name: Validate assume-role inputs
  ansible.builtin.assert:
    that:
      - role_arn | length > 0
      - aws_region | length > 0
    fail_msg: "role_arn and aws_region are required."

# Task-level `vars` exist only for this task - a scratchpad to keep the
# final expression readable. set_fact then promotes the assembled value to
# a host fact that persists for the rest of the play.
# The Jinja pipeline: default() supplies a fallback when a var is
# undefined; regex_replace strips characters STS rejects; [:24] truncates.
# lookup('pipe', ...) runs a shell command ON THE CONTROLLER and captures
# stdout - here, a timestamp making every session name unique/auditable.
- name: Build role session name
  vars:
    app_slug: "{{ (application_name | default('recovery') | lower | regex_replace('[^a-z0-9+=,.@-]', '-'))[:24] }}"
    job_id: "{{ tower_job_id | default(awx_job_id | default('unknown')) }}"
  ansible.builtin.set_fact:
    generated_role_session_name: "{{ app_slug }}-job-{{ job_id }}-{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"

# The actual STS AssumeRole API call. `register` captures the module's
# response (including the temporary keys) into a variable.
# changed_when: false -> this is a read-only credential exchange, so it
# should report 'ok', never 'changed'.
# no_log: true -> Ansible censors this task's arguments AND result in all
# output/logs. Critical here: the result contains live secret credentials,
# and AAP/AWX job logs are persistent.
- name: Assume AWS IAM role
  amazon.aws.sts_assume_role:
    role_arn: "{{ role_arn }}"
    role_session_name: "{{ generated_role_session_name }}"
  register: aws_assume_role_result
  changed_when: false
  no_log: true

# Defensive check that STS returned every field we're about to rely on.
# quiet: true keeps the passing-case output to one line.
- name: Validate response
  ansible.builtin.assert:
    that:
      - aws_assume_role_result.sts_creds is defined
      - aws_assume_role_result.sts_creds.access_key is defined
      - aws_assume_role_result.sts_creds.secret_key is defined
      - aws_assume_role_result.sts_creds.session_token is defined
      - aws_assume_role_result.sts_user.arn is defined
    quiet: true

# Publishes the temporary credentials as facts. aws_auth bundles them into
# one dict so downstream roles can pass access_key/secret_key/session_token
# as a unit. no_log again - set_fact would otherwise echo the values.
# These facts live for the remainder of the play only; nothing is written
# to disk.
- name: Store credentials
  ansible.builtin.set_fact:
    aws_access_key_id: "{{ aws_assume_role_result.sts_creds.access_key }}"
    aws_secret_access_key: "{{ aws_assume_role_result.sts_creds.secret_key }}"
    aws_session_token: "{{ aws_assume_role_result.sts_creds.session_token }}"
    aws_role_expiration: "{{ aws_assume_role_result.sts_creds.expiration }}"
    aws_assumed_role_arn: "{{ aws_assume_role_result.sts_user.arn }}"
    aws_auth:
      access_key: "{{ aws_assume_role_result.sts_creds.access_key }}"
      secret_key: "{{ aws_assume_role_result.sts_creds.secret_key }}"
      session_token: "{{ aws_assume_role_result.sts_creds.session_token }}"
      region: "{{ aws_region }}"
  no_log: true

# Smoke test: call GetCallerIdentity WITH the new credentials to prove
# they work before any real provisioning happens. Fails loudly here
# rather than mid-deployment.
- name: Verify assumed role
  amazon.aws.aws_caller_info:
    access_key: "{{ aws_access_key_id }}"
    secret_key: "{{ aws_secret_access_key }}"
    session_token: "{{ aws_session_token }}"
    region: "{{ aws_region }}"
  register: caller_identity
  changed_when: false

# Safe to log: the ARN and expiry are identifiers, not secrets.
- name: Display assumed role
  ansible.builtin.debug:
    msg: "Successfully assumed {{ caller_identity.arn }} (expires {{ aws_role_expiration }})"
