---
# ROLE VARS (not defaults): much higher precedence, effectively
# role-internal constants the caller isn't expected to override wholesale.
# Each value resolves a tag_* variable if the caller defined one, else the
# Jinja default() fallback - so unset tags become empty strings instead of
# 'undefined variable' errors.
enterprise_tags:

  Application: "{{ tag_application | default('') }}"

  Environment: "{{ tag_environment | default('') }}"

  BusinessUnit: "{{ tag_business_unit | default('') }}"

  CostCenter: "{{ tag_cost_center | default('') }}"

  Owner: "{{ tag_owner | default('') }}"

  ManagedBy: "{{ tag_managed_by | default('Ansible') }}"

  DataClassification: "{{ tag_data_classification | default('') }}"
