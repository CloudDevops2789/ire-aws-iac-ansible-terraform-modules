---
# Versioning keeps every object revision. It is also a prerequisite for
# Object Lock - locks apply to object VERSIONS.
- name: Enable S3 bucket versioning
  amazon.aws.s3_bucket:
    name: "{{ bucket_name }}"
    state: present
    versioning: true

    access_key: "{{ aws_auth.access_key }}"
    secret_key: "{{ aws_auth.secret_key }}"
    session_token: "{{ aws_auth.session_token }}"
  register: bucket_versioning_result

- name: Display versioning status
  ansible.builtin.debug:
    msg: "Versioning enabled on bucket {{ bucket_name }}"
