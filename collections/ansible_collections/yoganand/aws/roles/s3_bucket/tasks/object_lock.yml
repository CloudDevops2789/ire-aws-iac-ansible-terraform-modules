---
- name: Configure Object Lock default retention
  amazon.aws.s3_bucket:
    name: "{{ bucket_name }}"
    state: present
    region: "{{ bucket_region }}"
    object_lock_enabled: true
    object_lock_default_retention:
      mode: "{{ bucket_object_lock_mode }}"
      days: "{{ bucket_object_lock_retention_days }}"
    access_key: "{{ aws_auth.access_key }}"
    secret_key: "{{ aws_auth.secret_key }}"
    session_token: "{{ aws_auth.session_token }}"
  register: s3_object_lock_result
