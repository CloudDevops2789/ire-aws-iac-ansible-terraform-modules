---
# Input contract checks - fail before any AWS call is made. S3 bucket
# names must be 3-63 chars (AWS hard rule).
- name: Validate bucket name
  ansible.builtin.assert:
    that:
      - bucket_name | length > 2
      - bucket_name | length <= 63
    fail_msg: "A valid S3 bucket name must be provided."

- name: Validate bucket state
  ansible.builtin.assert:
    that:
      - bucket_state in ['present', 'absent']
    fail_msg: "bucket_state must be either 'present' or 'absent'."

- name: Validate encryption type
  ansible.builtin.assert:
    that:
      - bucket_encryption in ['AES256', 'aws:kms']
    fail_msg: "bucket_encryption must be AES256 or aws:kms."

# Conditional requirement expressed as boolean logic: 'not KMS, OR key
# provided'. Reads as: a KMS key id is only mandatory when encryption
# type is aws:kms.
- name: Validate KMS configuration
  ansible.builtin.assert:
    that:
      - bucket_encryption != 'aws:kms' or bucket_kms_key_id | length > 0
    fail_msg: "bucket_kms_key_id is required when using aws:kms encryption."
