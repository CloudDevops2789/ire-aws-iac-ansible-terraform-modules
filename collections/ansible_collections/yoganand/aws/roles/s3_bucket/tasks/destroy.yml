---
# Teardown path, reached only when bucket_state == 'absent'. `force`
# empties the bucket first (S3 refuses to delete non-empty buckets);
# gated behind bucket_force_destroy so accidental data loss requires two
# deliberate flags. Note: Object-Locked versions still under retention
# cannot be force-deleted - by design.
- name: Destroy S3 bucket
  amazon.aws.s3_bucket:
    name: "{{ bucket_name }}"
    state: absent
    region: "{{ bucket_region }}"
    force: "{{ bucket_force_destroy }}"
    access_key: "{{ aws_auth.access_key }}"
    secret_key: "{{ aws_auth.secret_key }}"
    session_token: "{{ aws_auth.session_token }}"
  register: s3_destroy_result

- name: Display destroy status
  ansible.builtin.debug:
    msg: "Bucket {{ bucket_name }} removed."
