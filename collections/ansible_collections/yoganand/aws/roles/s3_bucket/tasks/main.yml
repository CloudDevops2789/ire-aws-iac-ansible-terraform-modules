---
# DISPATCHER pattern: main.yml holds no real work, only the order of
# operations. Each step lives in its own small file pulled in with
# include_tasks (a DYNAMIC include - evaluated at runtime, so its `when`
# is checked once for the whole file; if false, the file is skipped
# entirely). This keeps every concern separately readable and testable.
- name: Validate input
  ansible.builtin.include_tasks: validate.yml

# bucket_state works like Terraform's create/destroy switch: 'present'
# runs the configure chain below, 'absent' jumps to destroy.yml.
- name: Create or update bucket
  ansible.builtin.include_tasks: create.yml
  when: bucket_state == "present"

- name: Configure versioning
  ansible.builtin.include_tasks: versioning.yml
  when:
    - bucket_state == "present"
    - bucket_versioning

# Multi-condition `when`: a list means all conditions AND together.
- name: Configure object lock
  ansible.builtin.include_tasks: object_lock.yml
  when:
    - bucket_state == "present"
    - bucket_object_lock

- name: Configure encryption
  ansible.builtin.include_tasks: encryption.yml
  when: bucket_state == "present"

- name: Block public access
  ansible.builtin.include_tasks: public_access.yml
  when:
    - bucket_state == "present"
    - bucket_public_access_block

- name: Apply enterprise tags
  ansible.builtin.include_tasks: tagging.yml
  when: bucket_state == "present"

- name: Gather outputs
  ansible.builtin.include_tasks: outputs.yml
  when: bucket_state == "present"

- name: Destroy bucket
  ansible.builtin.include_tasks: destroy.yml
  when: bucket_state == "absent"
