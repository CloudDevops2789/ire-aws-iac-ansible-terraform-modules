---
# combine() merges dicts, right side winning - org-wide defaults first,
# caller's bucket_tags override. purge_tags: false = additive only; tags
# added outside this role are left alone rather than deleted.
- name: Apply enterprise tags
  amazon.aws.s3_bucket:
    name: "{{ bucket_name }}"
    state: present
    region: "{{ bucket_region }}"
    tags: "{{ bucket_default_tags | combine(bucket_tags) }}"
    purge_tags: false
    access_key: "{{ aws_auth.access_key }}"
    secret_key: "{{ aws_auth.secret_key }}"
    session_token: "{{ aws_auth.session_token }}"
  register: s3_tagging_result
