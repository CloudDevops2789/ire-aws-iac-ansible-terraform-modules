---
# Collection build manifest: `ansible-galaxy collection build` reads this
# to produce the installable yoganand-aws-<version>.tar.gz artifact.
# namespace.name is also how playbooks address roles:
# yoganand.aws.assume_role.
namespace: yoganand
name: aws
version: 1.0.0
readme: README.md

authors:
  - Yoganand

description: >-
  Ansible roles for provisioning the AWS Isolated Recovery Environment (IRE)
  via Red Hat Ansible Automation Platform, using STS AssumeRole authentication.

license:
  - MIT-0

tags:
  - aws
  - cloud
  - infrastructure
  - recovery

# Collections auto-installed alongside this one - the amazon.aws modules
# (s3_bucket, sts_assume_role...) every role here calls.
dependencies:
  amazon.aws: ">=10.0.0"
  community.aws: ">=10.0.0"

repository: https://github.com/CloudDevops2789/ire-aws-iac-ansible-terraform-modules
