---
# GitHub Actions pipeline. Runs automatically on pushes to
# main/development and on pull requests targeting them - the quality gate
# in the feature -> development -> main flow.
name: CI

"on":
  push:
    branches: [main, development]
  pull_request:
    branches: [development, main]

permissions:
  contents: read

jobs:

  # Jobs run in PARALLEL on separate runners unless linked with `needs`.
  # This one lints YAML style (yamllint) and Ansible best practices
  # (ansible-lint, tuned by the repo's .ansible-lint config).
  ansible-lint:
    name: Ansible / YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install yamllint ansible-lint ansible-core

      - name: yamllint
        run: yamllint collections/ playbooks/ vars/*.yml

      - name: ansible-lint
        run: ansible-lint collections/ansible_collections/yoganand/aws playbooks/

  # fmt -check fails on unformatted code (fix locally with `terraform fmt
  # -recursive`). validate checks internal consistency; -backend=false
  # skips S3 state entirely - no AWS credentials needed in CI for this.
  terraform:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: terraform fmt
        run: terraform fmt -check -recursive terraform/

      - name: terraform validate (sandbox)
        working-directory: terraform/environments/sandbox
        run: |
          terraform init -backend=false -input=false
          terraform validate

  # Checkov scans the Terraform for security misconfigurations (public
  # IPs, missing flow logs, open SGs...). soft_fail: true = findings are
  # reported but never block the merge - advisory mode while the repo is
  # under construction. Flip to false to make it a hard release gate.
  security-scan:
    name: Checkov IaC scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: ${{ github.base_ref != 'main' }}   # report-only until findings are triaged
